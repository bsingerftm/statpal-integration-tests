name: StatPal API Integration Tests

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Integration Tests
        env:
          STATPAL_API_KEY: ${{ secrets.STATPAL_API_KEY }}
        run: npm test

      - name: Upload API Responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-responses-${{ github.run_id }}
          path: test-responses/
          retention-days: 30

      - name: Notify Slack of Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "StatPal Integration Tests Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *StatPal Integration Tests Passed*\n*Branch:* `${{ env.REF_NAME }}`\n*Commit:* `${{ env.COMMIT_SHA }}`\n*Author:* ${{ env.ACTOR }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ env.RUN_URL }}"
                    }
                  ]
                }
              ]
            }

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "StatPal Integration Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *StatPal Integration Tests Failed*\n*Branch:* `${{ env.REF_NAME }}`\n*Commit:* `${{ env.COMMIT_SHA }}`\n*Author:* ${{ env.ACTOR }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ env.RUN_URL }}"
                    }
                  ]
                }
              ]
            }
