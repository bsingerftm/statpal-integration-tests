name: StatPal API Integration Tests

on:
  schedule:
    # Run every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Integration Tests
        env:
          STATPAL_API_KEY: ${{ secrets.STATPAL_API_KEY }}
        run: npm test

      - name: Upload API Responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-responses-${{ github.run_id }}
          path: test-responses/
          retention-days: 30

      # - name: Email StatPal Support on Failure
      #   if: failure()
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     secure: true
      #     username: ${{ secrets.SMTP_USERNAME }}
      #     password: ${{ secrets.SMTP_PASSWORD }}
      #     subject: "StatPal API Integration Tests Failed"
      #     to: support@statpal.io
      #     from: ${{ secrets.SMTP_USERNAME }}
      #     body: |
      #       StatPal API integration tests have failed.
      #
      #       Branch: ${{ github.ref_name }}
      #       Commit: ${{ github.sha }}
      #       Author: ${{ github.actor }}
      #
      #       View the full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Parse Test Failures
        if: failure()
        id: test-failures
        run: |
          if [ -f test-results.json ]; then
            FAILURE_SUMMARY=$(node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const failures = [];
              for (const file of results.testResults || []) {
                for (const test of file.assertionResults || []) {
                  if (test.status === 'failed') {
                    const name = test.ancestorTitles.concat(test.title).join(' > ');
                    const msg = (test.failureMessages || []).map(m =>
                      m.split('\n').slice(0, 3).join(' ').substring(0, 200)
                    ).join('; ');
                    failures.push('• *' + name + '*\n   ' + msg);
                  }
                }
              }
              if (failures.length === 0) {
                console.log('No parsed failures (tests may have timed out or crashed).');
              } else {
                console.log(failures.join('\n'));
              }
            ")
          else
            FAILURE_SUMMARY="test-results.json not found — tests may have crashed before producing output."
          fi
          {
            echo "summary<<FAILURE_EOF"
            echo "$FAILURE_SUMMARY"
            echo "FAILURE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "StatPal Integration Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *StatPal Integration Tests Failed*\n*Branch:* `${{ env.REF_NAME }}`\n*Commit:* `${{ env.COMMIT_SHA }}`\n*Author:* ${{ env.ACTOR }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":memo: *Failing Tests:*\n${{ steps.test-failures.outputs.summary }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ env.RUN_URL }}"
                    }
                  ]
                }
              ]
            }
